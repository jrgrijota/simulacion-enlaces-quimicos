<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulación de Enlaces Químicos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="top-bar">
        <h1>Laboratorio de Enlaces Químicos</h1>
        <div class="controls">
            <label for="mode-select">Modo de Simulación:</label>
            <select id="mode-select">
                <option value="IONIC">Enlace Iónico</option>
                <option value="COVALENT">Enlace Covalente</option>
                <option value="METALLIC">Enlace Metálico</option>
            </select>
        </div>
    </header>

    <main id="simulation-container">
        <div id="ui-overlay" class="ui-layer">
            </div>
    </main>

    <script src="js/sketch.js"></script>
</body>
</html>
