<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio de Enlaces Químicos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-inner">

            <div class="sim-header">
                <div class="sim-logo">⚗</div>
                <div>
                    <div class="sim-title">Laboratorio de Enlaces</div>
                    <div class="sim-subtitle">Modelo de Bohr · Enlace Iónico</div>
                </div>
            </div>

            <div class="card is-expanded">
                <button class="card-trigger">Modo <span class="card-chevron">▼</span></button>
                <div class="card-body">
                    <select id="mode-select">
                        <option value="IONIC">Enlace Iónico</option>
                        <option value="COVALENT">Enlace Covalente</option>
                        <option value="METALLIC">Enlace Metálico</option>
                    </select>
                </div>
            </div>

            <div class="card" id="mode-info-card" style="padding: 10px 12px 11px;">
                <div class="info-section" id="mode-info-content"></div>
            </div>

            <div id="ui-overlay"></div>

        </div>
    </aside>

    <div id="canvas-holder">
        <div id="sim-frame"></div>
        <div id="atom-controls-row">
            <div id="ctrl-0" class="atom-ctrl"></div>
            <div id="ctrl-1" class="atom-ctrl"></div>
            <div id="ctrl-2" class="atom-ctrl"></div>
        </div>
    </div>

    <script src="js/sketch.js"></script>
    <script>
        document.querySelectorAll('.card-trigger').forEach(btn => {
            btn.addEventListener('click', () => btn.closest('.card').classList.toggle('is-expanded'));
        });
    </script>
</body>
</html>
